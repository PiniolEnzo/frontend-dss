<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos — Diagon Alley Admin</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/admin.css" />

  <!-- Blocking inline guard -->
  <script>
    (function() {
      try {
        var auth = JSON.parse(localStorage.getItem('techlab_auth') || '{}');
        if (auth.role !== 'ROLE_ADMIN') window.location.replace('/login.html');
      } catch(e) { window.location.replace('/login.html'); }
    })();
  </script>
</head>
<body>
  <div class="admin-layout">
    <div id="admin-sidebar"></div>

    <main class="admin-main">
      <div class="admin-header">
         <h1>Productos</h1>

        <button class="btn btn-primary" id="btn-new-product">+ Nuevo producto</button>
      </div>

      <div id="loading-products" class="loading-container">
        <div class="spinner spinner-lg"></div>
        <span class="loading-text">Cargando productos…</span>
      </div>

      <div class="table-container" id="products-table-container">
        <!-- Renderizado por JS -->
      </div>
    </main>
  </div>

  <!-- Product Modal -->
  <div class="modal-overlay hidden" id="product-modal">
    <div class="modal admin-modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Nuevo producto</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="product-form" class="modal-body">
        <div class="form-group">
          <label class="form-label" for="p-name">Nombre</label>
          <input type="text" id="p-name" name="name" class="form-input" required minlength="5" maxlength="80" />
        </div>
        <div class="form-group">
          <label class="form-label" for="p-description">Descripción</label>
          <textarea id="p-description" name="description" class="form-textarea" required minlength="10" maxlength="600"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="p-price">Precio</label>
            <input type="number" id="p-price" name="price" class="form-input" required min="0" step="0.01" />
          </div>
          <div class="form-group">
            <label class="form-label" for="p-stock">Stock</label>
            <input type="number" id="p-stock" name="stock" class="form-input" required min="0" step="1" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="p-category">Categoría</label>
          <select id="p-category" name="categoryId" class="form-select" required>
            <option value="">Seleccionar categoría</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="p-imageUrl">URL de imagen</label>
          <input type="url" id="p-imageUrl" name="imageUrl" class="form-input" placeholder="https://ejemplo.com/imagen.jpg" />
        </div>
      </form>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel">Cancelar</button>
        <button class="btn btn-primary" id="modal-save">Guardar</button>
      </div>
    </div>
  </div>

  <script type="module" src="../js/pages/admin/products.js"></script>
</body>
</html>
