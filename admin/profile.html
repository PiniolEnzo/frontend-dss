<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi perfil — Diagon Alley Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <div id="admin-sidebar"></div>

    <main class="admin-main">
      <div class="container" style="max-width: 700px;">
        <h1 class="section-title">Mi perfil</h1>

        <!-- Profile Info -->
        <div class="card" style="margin-bottom: var(--space-8);">
          <div class="card-header">
            <h3>Información personal</h3>
          </div>
          <div class="card-body">
            <div id="profile-info" class="loading-container">
              <div class="spinner"></div>
              <span class="loading-text">Cargando perfil…</span>
            </div>

            <form id="profile-form" class="hidden" novalidate>
              <div class="form-group">
                <label for="profile-name" class="form-label">Nombre completo</label>
                <input type="text" id="profile-name" name="name" class="form-input" minlength="5" maxlength="25" />
              </div>

              <div class="form-group">
                <label class="form-label">Email</label>
                <p class="text-sm text-muted" id="profile-email" style="padding: var(--space-2) 0;">—</p>
              </div>

              <button type="submit" class="btn btn-primary" id="btn-save-profile">Guardar cambios</button>
            </form>
          </div>
        </div>

        <!-- Change Password -->
        <div class="card">
          <div class="card-header">
            <h3>Cambiar contraseña</h3>
          </div>
          <div class="card-body">
            <form id="password-form" novalidate>
              <div class="form-group">
                <label for="oldPassword" class="form-label">Contraseña actual</label>
                <input type="password" id="oldPassword" name="oldPassword" class="form-input" required />
              </div>

              <div class="form-group">
                <label for="newPassword" class="form-label">Nueva contraseña</label>
                <input type="password" id="newPassword" name="newPassword" class="form-input" required autocomplete="new-password" />
                <span class="form-hint">10-25 caracteres, mayúscula, minúscula, número y carácter especial.</span>
              </div>

              <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirmar nueva contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" required autocomplete="new-password" />
              </div>

              <button type="submit" class="btn btn-primary" id="btn-change-password">Cambiar contraseña</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="../js/pages/admin/profile.js"></script>
</body>
</html>
