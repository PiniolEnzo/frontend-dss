<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finalizar compra — Diagon Alley</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/cart.css" />
</head>
<body>
  <div id="navbar-container"></div>

  <main class="page-content">
    <div class="container">
      <h1 class="section-title">Finalizar compra</h1>

      <div class="cart-page">
        <div class="cart-items-section">
          <div id="checkout-items">
            <!-- Renderizado por JS -->
          </div>
          <div id="loading-checkout" class="loading-container">
            <div class="spinner spinner-lg"></div>
            <span class="loading-text">Preparando resumen…</span>
          </div>
        </div>

        <div class="cart-summary-section">
          <div class="cart-summary" id="checkout-summary">
            <!-- Renderizado por JS -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>&copy; 2025 Diagon Alley. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script type="module" src="js/pages/checkout.js"></script>
</body>
</html>
