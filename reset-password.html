<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva contraseña — Diagon Alley</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div id="navbar-container"></div>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-card-header">
        <h1>Nueva contraseña</h1>
        <p>Ingresá tu nueva contraseña</p>
      </div>

      <div id="auth-error" class="auth-error hidden"></div>
      <div id="reset-content">
        <form id="reset-form" class="auth-form" novalidate>
          <div class="form-group">
            <label for="newPassword" class="form-label">Nueva contraseña</label>
            <input
              type="password"
              id="newPassword"
              name="newPassword"
              class="form-input"
              placeholder="••••••••••"
              required
              autocomplete="new-password"
            />
          </div>

          <div class="form-group">
            <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              class="form-input"
              placeholder="Repetí tu contraseña"
              required
              autocomplete="new-password"
            />
          </div>

          <button type="submit" class="btn btn-primary btn-lg btn-block" id="btn-submit">
            Restablecer contraseña
          </button>
        </form>
      </div>

      <div class="auth-card-footer">
        <a href="/login.html">Volver a iniciar sesión</a>
      </div>
    </div>
  </main>

  <script type="module" src="js/pages/resetPassword.js"></script>
</body>
</html>
