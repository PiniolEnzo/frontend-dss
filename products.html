<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos — Diagon Alley</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/products.css" />
</head>
<body>
  <div id="navbar-container"></div>

  <main class="page-content">
    <div class="container">
      <div class="catalog-header">
         <h1 class="section-title" style="margin-bottom: 0;">Productos</h1>

        <div class="filter-bar">
          <select id="category-filter" class="form-select" style="max-width: 250px;">
            <option value="">Todas las categorías</option>
          </select>
        </div>
      </div>

      <div id="products-grid" class="product-grid">
        <!-- Renderizado por JS -->
      </div>

      <div id="loading-products" class="loading-container">
        <div class="spinner spinner-lg"></div>
        <span class="loading-text">Cargando productos…</span>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>&copy; 2025 Diagon Alley. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script type="module" src="js/pages/products.js"></script>
</body>
</html>
