<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagon Alley — Tecnología para vos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/products.css" />
</head>
<body>
  <div id="navbar-container"></div>

  <main>
    <!-- Categories Filter -->
    <section class="catalog-section" id="productos">
      <div class="container">
        <div class="catalog-header">
          <h2 class="section-title">Nuestros Productos</h2>
          <div class="filter-bar">
            <select id="category-filter" class="form-select" style="max-width: 250px;">
              <option value="">Todas las categorías</option>
            </select>
          </div>
        </div>

        <div id="public-products-grid" class="product-grid">
          <!-- Renderizado por JS -->
        </div>

        <div id="loading-products" class="loading-container">
          <div class="spinner spinner-lg"></div>
          <span class="loading-text">Cargando productos…</span>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>&copy; 2025 Diagon Alley. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script type="module" src="js/pages/index.js"></script>
</body>
</html>
