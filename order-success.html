<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compra exitosa — Diagon Alley</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div id="navbar-container"></div>

  <main class="page-content">
    <div class="container">
      <div class="empty-state" id="success-content">
        <div class="empty-state-icon" style="font-size: 4rem; color: var(--color-success);">✓</div>
        <h2 class="empty-state-title" style="font-size: var(--text-2xl);">¡Compra realizada con éxito!</h2>
        <p class="empty-state-text">Gracias por tu compra. Te enviamos el detalle a tu email.</p>

        <div id="order-summary" class="card" style="max-width: 500px; margin: var(--space-8) auto; text-align: left;">
          <!-- Renderizado por JS -->
        </div>

        <div style="display: flex; gap: var(--space-4); justify-content: center; flex-wrap: wrap;">
          <a href="/orders.html" class="btn btn-primary">Ver mis órdenes</a>
          <a href="/products.html" class="btn btn-secondary">Seguir comprando</a>
        </div>
      </div>

      <div id="loading-success" class="loading-container">
        <div class="spinner spinner-lg"></div>
        <span class="loading-text">Cargando detalle de la orden…</span>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>&copy; 2025 Diagon Alley. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script type="module" src="js/pages/orderSuccess.js"></script>
</body>
</html>
