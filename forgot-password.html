<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña — Diagon Alley</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div id="navbar-container"></div>

  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-card-header">
        <h1>Recuperar contraseña</h1>
        <p>Te enviaremos un enlace para restablecer tu contraseña</p>
      </div>

      <div id="auth-error" class="auth-error hidden"></div>

      <form id="forgot-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="tu@email.com"
            required
            maxlength="60"
            autocomplete="email"
          />
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block" id="btn-submit">
          Enviar enlace
        </button>
      </form>

      <div class="auth-card-footer">
        <a href="/login.html">Volver a iniciar sesión</a>
      </div>
    </div>
  </main>

  <script type="module" src="js/pages/forgotPassword.js"></script>
</body>
</html>
