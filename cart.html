<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito — Diagon Alley</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/cart.css" />
</head>
<body>
  <div id="navbar-container"></div>

  <main class="page-content">
    <div class="container">
      <div class="cart-page">
        <div class="cart-items-section">
          <div class="cart-header">
            <h1 class="section-title" style="margin-bottom: 0;">Carrito de compras</h1>
            <div class="cart-header-actions">
              <button class="btn btn-secondary btn-sm" id="btn-continue-shopping">Seguir comprando</button>
              <button class="btn btn-danger btn-sm" id="btn-clear-cart">Vaciar carrito</button>
            </div>
          </div>

          <div id="cart-items-container">
            <!-- Renderizado por JS -->
          </div>

          <div id="loading-cart" class="loading-container">
            <div class="spinner spinner-lg"></div>
            <span class="loading-text">Cargando carrito…</span>
          </div>
        </div>

        <div class="cart-summary-section">
          <div class="cart-summary" id="cart-summary">
            <!-- Renderizado por JS -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>&copy; 2025 Diagon Alley. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script type="module" src="js/pages/cart.js"></script>
</body>
</html>
